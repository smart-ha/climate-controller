name: Validate

on:
  push:
  pull_request:
  schedule:
    # Ежедневно — ловит изменения требований HACS/hassfest, даже когда в репо тихо.
    - cron: "0 0 * * *"

jobs:
  hacs:
    name: HACS
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: hacs/action@main
        with:
          category: integration
          # Кастомный репозиторий (не в home-assistant/brands) — пропускаем
          # проверку brand-ассетов. Остальные проверки HACS остаются.
          ignore: brands

  hassfest:
    name: Hassfest
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master
